version: '3.8'

services:

  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - 22181:2181
    networks:
      - async-net

  kafka:
    image: confluentinc/cp-kafka:latest
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - 29092:29092
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - async-net

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    depends_on:
      - kafka
    ports:
      - 8090:8080
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    networks:
      - async-net

  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka-init
    depends_on:
      - kafka
    volumes:
      - ./docker/kafka/init-topics.sh:/init-topics.sh
    entrypoint: [ "sh", "/init-topics.sh" ]
    networks:
      - async-net

  persona-db:
    image: postgres:16
    container_name: persona-db
    environment:
      POSTGRES_DB: persona_db
      POSTGRES_USER: persona_user
      POSTGRES_PASSWORD: persona_pass
    ports:
      - "5433:5432"
    networks:
      - async-net
    volumes:
      - persona-data:/var/lib/postgresql/data

  cuenta-db:
    image: postgres:16
    container_name: cuenta-db
    environment:
      POSTGRES_DB: cuenta_db
      POSTGRES_USER: cuenta_user
      POSTGRES_PASSWORD: cuenta_pass
    ports:
      - "5434:5432"
    networks:
      - async-net
    volumes:
      - cuenta-data:/var/lib/postgresql/data

  persona-service:
    build: ./PersonaService
    container_name: persona-service
    depends_on:
      - persona-db
      - kafka
    ports:
      - "8081:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://persona-db:5432/persona_db
      SPRING_DATASOURCE_USERNAME: persona_user
      SPRING_DATASOURCE_PASSWORD: persona_pass
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    networks:
      - async-net

  cuenta-service:
    build: ./CuentaService
    container_name: cuenta-service
    depends_on:
      - cuenta-db
      - kafka
    ports:
      - "8082:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://cuenta-db:5432/cuenta_db
      SPRING_DATASOURCE_USERNAME: cuenta_user
      SPRING_DATASOURCE_PASSWORD: cuenta_pass
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    networks:
      - async-net

networks:
  async-net:

volumes:
  persona-data:
  cuenta-data: