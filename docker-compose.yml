version: '3.8'

services:

  postgres:
    image: postgres:16
    container_name: persona-db
    environment:
      POSTGRES_DB: persona_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    networks:
      - persona-net

  persona-service:
    build: .
    container_name: persona-service
    depends_on:
      - postgres
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/persona_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    networks:
      - persona-net

networks:
  persona-net: