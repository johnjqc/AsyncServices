openapi: 3.0.3

info:
  title: Customer Service API
  version: 1.0.0
  description: Customer and Person Management API

servers:
  - url: /api/v1

tags:
  - name: Customers

paths:

  /api/v1/customers:

    get:
      tags:
        - Customers
      operationId: getCustomers

      parameters:
        - $ref: '#/components/parameters/CorrelationIdHeader'
        - $ref: '#/components/parameters/TransactionIdHeader'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'

      responses:

        '200':
          description: Customers retrieved successfully

          headers:

            X-Correlation-Id:
              $ref: '#/components/headers/CorrelationIdResponse'

            X-Transaction-Id:
              $ref: '#/components/headers/TransactionIdResponse'

          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerPageResponse'

        '500':
          description: Internal server error

          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    post:
      tags:
        - Customers
      operationId: createCustomer

      parameters:
        - $ref: '#/components/parameters/CorrelationIdHeader'
        - $ref: '#/components/parameters/TransactionIdHeader'

      requestBody:
        required: true

        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCustomerRequest'

      responses:

        '201':
          description: Customer created successfully

          headers:

            X-Correlation-Id:
              $ref: '#/components/headers/CorrelationIdResponse'

            X-Transaction-Id:
              $ref: '#/components/headers/TransactionIdResponse'

          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerResponse'

        '400':
          description: Validation error

          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

        '409':
          description: Customer already exists

          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

        '500':
          description: Internal server error

          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/customers/{customerId}:

    get:
      tags:
        - Customers
      operationId: getCustomerById

      parameters:
        - $ref: '#/components/parameters/CorrelationIdHeader'
        - $ref: '#/components/parameters/TransactionIdHeader'

        - name: customerId
          in: path
          required: true
          schema:
            type: integer
            format: int64

      responses:

        '200':
          description: Customer found

          headers:

            X-Correlation-Id:
              $ref: '#/components/headers/CorrelationIdResponse'

            X-Transaction-Id:
              $ref: '#/components/headers/TransactionIdResponse'

          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerResponse'

        '404':
          description: Customer not found

          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

        '500':
          description: Internal server error

          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    put:
      tags:
        - Customers
      operationId: updateCustomer

      parameters:
        - $ref: '#/components/parameters/CorrelationIdHeader'
        - $ref: '#/components/parameters/TransactionIdHeader'

        - name: customerId
          in: path
          required: true
          schema:
            type: integer
            format: int64

      requestBody:
        required: true

        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCustomerRequest'

      responses:

        '200':
          description: Customer updated

          headers:

            X-Correlation-Id:
              $ref: '#/components/headers/CorrelationIdResponse'

            X-Transaction-Id:
              $ref: '#/components/headers/TransactionIdResponse'

          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerResponse'

        '400':
          description: Validation error

          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

        '404':
          description: Customer not found

          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

        '500':
          description: Internal server error

          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      tags:
        - Customers
      operationId: deleteCustomer

      parameters:
        - $ref: '#/components/parameters/CorrelationIdHeader'
        - $ref: '#/components/parameters/TransactionIdHeader'

        - name: customerId
          in: path
          required: true
          schema:
            type: integer
            format: int64

      responses:

        '204':
          description: Customer deleted

          headers:

            X-Correlation-Id:
              $ref: '#/components/headers/CorrelationIdResponse'

            X-Transaction-Id:
              $ref: '#/components/headers/TransactionIdResponse'

        '404':
          description: Customer not found

          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

        '500':
          description: Internal server error

          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:

  parameters:

    CorrelationIdHeader:
      name: X-Correlation-Id
      in: header
      required: false
      description: Distributed trace identifier
      schema:
        type: string
        format: uuid

    TransactionIdHeader:
      name: X-Transaction-Id
      in: header
      required: false
      description: Business transaction identifier
      schema:
        type: string
        format: uuid

    Page:
      name: page
      in: query
      required: false
      description: Page number (0-based)
      schema:
        type: integer
        minimum: 0
        default: 0

    Size:
      name: size
      in: query
      required: false
      description: Page size
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20

  headers:

    CorrelationIdResponse:
      description: Distributed trace identifier
      schema:
        type: string

    TransactionIdResponse:
      description: Business transaction identifier
      schema:
        type: string

  schemas:

    CreateCustomerRequest:
      type: object
      required:
        - name
        - gender
        - age
        - identification
        - address
        - phone
        - password
        - active
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100

        gender:
          $ref: '#/components/schemas/Gender'

        age:
          type: integer
          minimum: 0
          maximum: 150

        identification:
          type: string
          minLength: 1
          maxLength: 20

        address:
          type: string
          minLength: 1
          maxLength: 255

        phone:
          type: string
          minLength: 1
          maxLength: 20

        password:
          type: string
          minLength: 4
          maxLength: 100

        active:
          type: boolean

    UpdateCustomerRequest:
      type: object
      required:
        - name
        - gender
        - age
        - address
        - phone
        - active
      properties:

        name:
          type: string
          minLength: 1
          maxLength: 100

        gender:
          $ref: '#/components/schemas/Gender'

        age:
          type: integer
          minimum: 0
          maximum: 150

        address:
          type: string
          minLength: 1
          maxLength: 255

        phone:
          type: string
          minLength: 1
          maxLength: 20

        active:
          type: boolean

    CustomerPageResponse:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/CustomerResponse'

        page:
          type: integer

        size:
          type: integer

        totalElements:
          type: integer
          format: int64

        totalPages:
          type: integer

        first:
          type: boolean

        last:
          type: boolean

        numberOfElements:
          type: integer

    CustomerResponse:
      type: object
      properties:
        customerId:
          type: integer
          format: int64

        name:
          type: string

        gender:
          $ref: '#/components/schemas/Gender'

        age:
          type: integer

        identification:
          type: string

        address:
          type: string

        phone:
          type: string

        active:
          type: boolean

        createdAt:
          type: string
          format: date-time

        updatedAt:
          type: string
          format: date-time

    ErrorResponse:
      type: object
      required:
        - code
        - message
        - timestamp
      properties:
        code:
          type: string

        message:
          type: string

        timestamp:
          type: string
          format: date-time

        correlationId:
          type: string

        transactionId:
          type: string

    Gender:
      type: string
      enum:
        - MALE
        - FEMALE
        - OTHER