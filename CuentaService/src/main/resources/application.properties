server.port=8084

info.app.name= cuenta-service
info.app.description= Account and Movements Management API
info.app.version= 1.0.0
info.company.name= Demo Project

management.endpoints.web.exposure.include= health,info
management.endpoint.health.show-details= never

springdoc.show-actuator= true

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

spring.datasource.url=jdbc:h2:mem:test
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

spring.sql.init.mode=always
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.defer-datasource-initialization=true

spring.kafka.bootstrap-servers=localhost:29092
spring.kafka.consumer.group-id=account-service
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.properties.spring.json.trusted.packages=com.johnjqc.devsu.persona.*
spring.kafka.properties.spring.json.use.type.headers=false
spring.kafka.properties.spring.json.value.default.type=com.johnjqc.devsu.cuenta.event.payload.ClientCreatedEvent